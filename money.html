<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부부 가계부 대시보드</title>
  
  <!-- React & ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Recharts (그래프 라이브러리) 및 종속성 고정 -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-20 md:pb-10">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

    // --- Lucide Icons Components (Inline SVG 렌더링 함수) ---
    const IconWrapper = ({ name, className }) => {
      const [svgContent, setSvgContent] = useState('');

      useEffect(() => {
        if (lucide && lucide.icons && lucide.icons[name]) {
          const iconNode = lucide.icons[name];
          
          const attrsToString = (attrs) => {
              return Object.entries(attrs).map(([key, value]) => `${key}="${value}"`).join(' ');
          };

          const createSvgString = (iconData, extraClass) => {
              const [, attrs, children] = iconData;
              const mergedAttrs = { ...attrs, class: `lucide lucide-${name} ${extraClass || ''}` };
              
              const childrenString = children.map(child => {
                  const [tag, childAttrs] = child;
                  return `<${tag} ${attrsToString(childAttrs)}></${tag}>`;
              }).join('');

              return `<svg ${attrsToString(mergedAttrs)}>${childrenString}</svg>`;
          };
          
          const svgAttrs = `xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className || ''}"`;
          
          let innerContent = '';
          if (name === 'Wallet') innerContent = `<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>`;
          else if (name === 'CreditCard') innerContent = `<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>`;
          else if (name === 'Landmark') innerContent = `<line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/>`;
          else if (name === 'RefreshCw') innerContent = `<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>`;
          else if (name === 'Shield') innerContent = `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>`;
          else if (name === 'PiggyBank') innerContent = `<path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.7-1 2-2h2v-4h-2c0-1-.5-1.5-1-2h0V5z"/><path d="M2 9v1c0 1.1.9 2 2 2h1"/><path d="M16 11h.01"/>`;
          else if (name === 'Calculator') innerContent = `<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>`;
          else if (name === 'TrendingDown') innerContent = `<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>`;
          else if (name === 'TrendingUp') innerContent = `<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>`;
          else if (name === 'Plus') innerContent = `<path d="M5 12h14"/><path d="M12 5v14"/>`;
          else if (name === 'Minus') innerContent = `<path d="M5 12h14"/>`;
          else if (name === 'Trash2') innerContent = `<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>`;
          else if (name === 'BarChart3') innerContent = `<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>`;

          setSvgContent(`<svg ${svgAttrs}>${innerContent}</svg>`);
        }
      }, [name, className]);

      return <span dangerouslySetInnerHTML={{ __html: svgContent }} />;
    };

    const Wallet = (props) => <IconWrapper name="Wallet" {...props} />;
    const CreditCard = (props) => <IconWrapper name="CreditCard" {...props} />;
    const Landmark = (props) => <IconWrapper name="Landmark" {...props} />;
    const RefreshCw = (props) => <IconWrapper name="RefreshCw" {...props} />;
    const Shield = (props) => <IconWrapper name="Shield" {...props} />;
    const PiggyBank = (props) => <IconWrapper name="PiggyBank" {...props} />;
    const Calculator = (props) => <IconWrapper name="Calculator" {...props} />;
    const TrendingDown = (props) => <IconWrapper name="TrendingDown" {...props} />;
    const TrendingUp = (props) => <IconWrapper name="TrendingUp" {...props} />;
    const Plus = (props) => <IconWrapper name="Plus" {...props} />;
    const Minus = (props) => <IconWrapper name="Minus" {...props} />;
    const Trash2 = (props) => <IconWrapper name="Trash2" {...props} />;
    const BarChart3 = (props) => <IconWrapper name="BarChart3" {...props} />;

    // --- 유틸리티 ---
    const formatCurrency = (value) => {
      if (value === null || value === undefined || isNaN(value)) return '₩0';
      return `₩${new Intl.NumberFormat('ko-KR').format(value)}`;
    };

    const parseNumber = (value) => {
      if (typeof value === 'number') return value;
      return Number(value.replace(/[^0-9]/g, '')) || 0;
    };

    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

    const getCurrentYearMonth = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    };

    const getMonthDiff = (m1, m2) => {
      const [y1, mo1] = m1.split('-').map(Number);
      const [y2, mo2] = m2.split('-').map(Number);
      return (y1 - y2) * 12 + (mo1 - mo2);
    };

    // --- 초기 템플릿 ---
    const defaultDummyData = {
      seoyeon: { 
        income: 3268559, 
        cards: [
          { id: generateId(), companyName: '비씨', lumpSum: 1574122, installments: [{ id: generateId(), name: '자동차보험', principal: 553770, currentPayment: 46148, interest: 0, remaining: 318255, round: '6/12' }, { id: generateId(), name: '네이버(스칼렛)', principal: 198000, currentPayment: 33000, interest: 0, remaining: 33000, round: '5/6' }] }
        ],
        loans: [],
        autoTransfers: [
          { id: generateId(), name: '아파트관리비', date: '말일', amount: 400000 },
          { id: generateId(), name: '삼남매(카카오481)', date: '말일', amount: 50000 },
          { id: generateId(), name: '별서하우지(카뱅2465)', date: '10일', amount: 20000 },
          { id: generateId(), name: '넷플릭스(농협)', date: '카드결제일', amount: 7900 }
        ],
        insurances: [{ id: generateId(), name: '기본 보험', amount: 244220 }],
        pocketMoney: 0 
      },
      sunghoon: { 
        income: 3300000, 
        cards: [
          { id: generateId(), companyName: '삼성', lumpSum: 234225, installments: [{ id: generateId(), name: '주식회사 놀유니버스', principal: 204000, currentPayment: 68000, interest: 0, remaining: 136000, round: '1/3' }] }
        ],
        loans: [
          { id: generateId(), name: '마이너스 통장', principal: 25000000, currentPayment: 60820, interest: 0, remaining: 24995033, isMinusAccount: true },
          { id: generateId(), name: '신용대출', principal: 40000000, currentPayment: 1170159, interest: 0, remaining: 12222221, isMinusAccount: false }
        ],
        autoTransfers: [{ id: generateId(), name: '기본 자동이체', date: '', amount: 102560 }],
        insurances: [{ id: generateId(), name: '기본 보험', amount: 305596 }],
        pocketMoney: 0 
      }
    };

    const calculatePersonData = (personData) => {
      let ccLumpSum = 0; let ccInstallment = 0;
      if (personData.cards) {
        personData.cards.forEach(card => {
          ccLumpSum += (card.lumpSum || 0);
          if (card.installments) card.installments.forEach(inst => ccInstallment += (inst.currentPayment || 0) + (inst.interest || 0));
        });
      } else { ccLumpSum = personData.ccLumpSum || 0; ccInstallment = personData.ccInstallment || 0; }

      let loanTotal = 0; if (personData.loans) personData.loans.forEach(loan => loanTotal += (loan.currentPayment || 0) + (loan.interest || 0)); else loanTotal = personData.loan || 0;
      let autoTransferTotal = 0; if (personData.autoTransfers) personData.autoTransfers.forEach(transfer => autoTransferTotal += (transfer.amount || 0)); else autoTransferTotal = personData.autoTransfer || 0;
      let insuranceTotal = 0; if (personData.insurances) personData.insurances.forEach(ins => insuranceTotal += (ins.amount || 0)); else insuranceTotal = personData.insurance || 0;

      const totalCc = ccInstallment + ccLumpSum;
      const totalExpense = totalCc + loanTotal + autoTransferTotal + insuranceTotal + personData.pocketMoney;
      const balance = personData.income - totalExpense;
      return { ccLumpSum, ccInstallment, totalCc, loanTotal, autoTransferTotal, insuranceTotal, totalExpense, balance };
    };

    // --- UI Components ---
    const CurrencyInput = ({ label, icon: Icon, value, onChange, bgClass = 'bg-white' }) => (
      <div className="flex flex-col mb-2">
        <label className="text-sm font-semibold text-gray-600 mb-1 flex items-center">
          {Icon && <Icon className="w-4 h-4 mr-1 text-gray-400" />} {label}
        </label>
        <div className="relative">
          <span className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 font-bold">₩</span>
          <input type="text" className={`w-full pl-8 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-right font-medium text-gray-800 ${bgClass} shadow-sm`} value={new Intl.NumberFormat('ko-KR').format(value)} onChange={(e) => onChange(e.target.value)} inputMode="numeric" />
        </div>
      </div>
    );

    const SummaryCard = ({ title, amount, type }) => {
      const isPositive = type === 'income' || (type === 'balance' && amount >= 0);
      const colorClass = type === 'income' ? 'text-blue-600' : type === 'expense' ? 'text-red-500' : isPositive ? 'text-green-600' : 'text-red-600';
      const bgClass = type === 'income' ? 'bg-blue-50' : type === 'expense' ? 'bg-red-50' : 'bg-gray-800';
      return (
        <div className={`${bgClass} rounded-2xl p-5 shadow-sm border ${type === 'balance' ? 'border-gray-800' : 'border-gray-100'} flex flex-col justify-center`}>
          <span className={`text-sm font-semibold ${type === 'balance' ? 'text-gray-300' : 'text-gray-500'} mb-1`}>{title}</span>
          <span className={`text-2xl font-bold ${type === 'balance' ? (amount >= 0 ? 'text-green-400' : 'text-red-400') : colorClass}`}>{formatCurrency(amount)}</span>
        </div>
      );
    };

    const ExpenseAccordion = ({ title, icon: Icon, totalAmount, themeClass, isExpanded, onToggle, children }) => {
      return (
        <div className={`border rounded-2xl overflow-hidden shadow-sm transition-all duration-300 ease-in-out ${isExpanded ? 'border-gray-300 shadow-md ring-1 ring-gray-100' : 'border-gray-200 hover:border-gray-300'}`}>
          <div className={`flex justify-between items-center p-4 cursor-pointer select-none transition-colors duration-300 ${isExpanded ? 'bg-gray-50' : 'bg-white'}`} onClick={onToggle}>
            <div className="flex items-center space-x-3">
              <div className={`p-2 rounded-xl ${themeClass.iconBg} ${themeClass.iconColor} transition-colors duration-300`}><Icon className="w-5 h-5" /></div>
              <span className="font-bold text-gray-800 text-base">{title}</span>
            </div>
            <div className="flex items-center space-x-3">
              <span className="font-bold text-lg text-gray-900">{formatCurrency(totalAmount)}</span>
              <div className={`p-1.5 rounded-full transition-all duration-300 flex items-center justify-center w-8 h-8 ${isExpanded ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-500'}`}>
                {isExpanded ? <Minus className="w-4 h-4" /> : <Plus className="w-4 h-4" />}
              </div>
            </div>
          </div>
          <div className={`grid transition-[grid-template-rows,opacity] duration-300 ease-in-out ${isExpanded ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
            <div className="overflow-hidden">
              <div className="p-4 border-t border-gray-100 bg-white">
                {children}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const CustomTooltip = ({ active, payload, label }) => {
      if (active && payload && payload.length) {
        return (
          <div className="bg-white/95 backdrop-blur-sm p-4 border border-gray-200 shadow-xl rounded-xl">
            <p className="font-bold text-gray-800 mb-3 pb-2 border-b border-gray-100">{label}</p>
            <div className="space-y-1.5">
              {payload.map((entry, index) => (
                <div key={index} className="flex justify-between items-center space-x-6">
                  <span style={{ color: entry.color }} className="text-sm font-semibold flex items-center">
                    <span className="w-2 h-2 rounded-full mr-2" style={{ backgroundColor: entry.color }}></span>
                    {entry.name}
                  </span>
                  <span className="text-sm font-bold text-gray-800">{formatCurrency(entry.value)}</span>
                </div>
              ))}
            </div>
          </div>
        );
      }
      return null;
    };

    // --- 메인 컴포넌트 ---
    function HouseholdLedger() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [activeTab, setActiveTab] = useState('main');
      const [expandedSections, setExpandedSections] = useState({});
      
      const [currentMonth, setCurrentMonth] = useState(getCurrentYearMonth());
      const [records, setRecords] = useState({});

      const toggleExpand = (id) => {
        setExpandedSections(prev => ({
          ...prev,
          [id]: !prev[id]
        }));
      };

      useEffect(() => {
        const savedRecords = localStorage.getItem('householdRecords_v2');
        if (savedRecords) {
          let parsedRecords = JSON.parse(savedRecords);
          
          // 기존 데이터(마이너스 통장 여부) 자동 적용 마이그레이션
          Object.values(parsedRecords).forEach(mData => {
              ['seoyeon', 'sunghoon'].forEach(p => {
                  if (mData[p] && mData[p].loans) {
                      mData[p].loans.forEach(l => {
                          if (l.isMinusAccount === undefined) {
                              l.isMinusAccount = l.name.includes('마이너스');
                          }
                      });
                  }
              });
          });
          
          setRecords(parsedRecords);
          setIsLoaded(true);
          return;
        }

        const savedV1 = localStorage.getItem('householdData');
        if (savedV1) {
          try {
            let parsed = JSON.parse(savedV1);
            ['seoyeon', 'sunghoon'].forEach(person => {
              if (!parsed[person].cards) {
                parsed[person].cards = [{ id: generateId(), companyName: '기본카드', lumpSum: parsed[person].ccLumpSum || 0, installments: parsed[person].ccInstallment > 0 ? [{ id: generateId(), name: '기존 할부 내역', principal: 0, currentPayment: parsed[person].ccInstallment, interest: 0, remaining: 0, round: '' }] : [] }];
              }
              if (parsed[person].loan !== undefined && !parsed[person].loans) parsed[person].loans = parsed[person].loan > 0 ? [{ id: generateId(), name: '기존 대출', principal: 0, currentPayment: parsed[person].loan, interest: 0, remaining: 0, isMinusAccount: false }] : [];
              if (parsed[person].autoTransfer !== undefined && !parsed[person].autoTransfers) parsed[person].autoTransfers = parsed[person].autoTransfer > 0 ? [{ id: generateId(), name: '기존 자동이체 총합', date: '', amount: parsed[person].autoTransfer }] : [];
              if (parsed[person].insurance !== undefined && !parsed[person].insurances) parsed[person].insurances = parsed[person].insurance > 0 ? [{ id: generateId(), name: '기존 보험 총합', amount: parsed[person].insurance }] : [];
              
              if (parsed[person].loans) {
                 parsed[person].loans.forEach(l => {
                     if (l.isMinusAccount === undefined) l.isMinusAccount = l.name.includes('마이너스');
                 });
              }
            });
            setRecords({ [getCurrentYearMonth()]: parsed });
          } catch(e) { console.error("데이터 불러오기 실패", e); }
        } else {
           setRecords({ [getCurrentYearMonth()]: defaultDummyData });
        }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (isLoaded) {
          localStorage.setItem('householdRecords_v2', JSON.stringify(records));
        }
      }, [records, isLoaded]);

      const currentData = records[currentMonth] || { 
        seoyeon: { income: 0, cards: [], loans: [], autoTransfers: [], insurances: [], pocketMoney: 0 }, 
        sunghoon: { income: 0, cards: [], loans: [], autoTransfers: [], insurances: [], pocketMoney: 0 } 
      };

      const updateCurrentData = (updater) => {
        setRecords(prev => {
          const prevData = prev[currentMonth] || defaultDummyData;
          const newData = typeof updater === 'function' ? updater(prevData) : updater;
          return { ...prev, [currentMonth]: newData };
        });
      };

      const handleMonthChange = (newMonth) => {
        if (!newMonth) return;
        setCurrentMonth(newMonth);
        
        if (!records[newMonth]) {
           const existingMonths = Object.keys(records).sort();
           let baseMonth = null;
           for (let i = existingMonths.length - 1; i >= 0; i--) {
             if (existingMonths[i] < newMonth) {
               baseMonth = existingMonths[i];
               break;
             }
           }
           
           if (!baseMonth) {
             baseMonth = existingMonths[0] || currentMonth;
             const clonedData = JSON.parse(JSON.stringify(records[baseMonth] || currentData));
             ['seoyeon', 'sunghoon'].forEach(p => {
               if (clonedData[p] && clonedData[p].cards) {
                 clonedData[p].cards.forEach(c => { c.lumpSum = 0; });
               }
             });
             setRecords(prev => ({ ...prev, [newMonth]: clonedData }));
             return;
           }

           const deltaMonths = getMonthDiff(newMonth, baseMonth);
           const clonedData = JSON.parse(JSON.stringify(records[baseMonth]));

           ['seoyeon', 'sunghoon'].forEach(p => {
             if (clonedData[p] && clonedData[p].cards) {
               clonedData[p].cards.forEach(card => {
                 card.lumpSum = 0; 
                 if (card.installments) {
                   card.installments = card.installments.map(inst => {
                     const roundMatch = String(inst.round || '').match(/^(\d+)\s*\/\s*(\d+)$/);
                     if (roundMatch) {
                       const cur = parseInt(roundMatch[1], 10);
                       const tot = parseInt(roundMatch[2], 10);
                       const newCur = cur + deltaMonths;
                       
                       if (newCur > tot) return null;
                       
                       const payment = parseNumber(inst.currentPayment) || 0;
                       let newRemaining = (parseNumber(inst.remaining) || 0) - (payment * deltaMonths);
                       if (newRemaining < 0) newRemaining = 0;

                       return { ...inst, round: `${newCur}/${tot}`, remaining: newRemaining };
                     }
                     return inst;
                   }).filter(Boolean); 
                 }
               });
             }
           });

           setRecords(prev => ({ ...prev, [newMonth]: clonedData }));
        }
      };

      const handleInputChange = (person, field, value) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], [field]: parseNumber(value) } }));
      const addCard = (person) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], cards: [...(prev[person].cards || []), { id: generateId(), companyName: '', lumpSum: 0, installments: [] }] } }));
      const removeCard = (person, cardId) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], cards: prev[person].cards.filter(c => c.id !== cardId) } }));
      const handleCardChange = (person, cardId, field, value) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], cards: prev[person].cards.map(c => c.id === cardId ? { ...c, [field]: field === 'companyName' ? value : parseNumber(value) } : c) } }));
      const addInstallment = (person, cardId) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], cards: prev[person].cards.map(c => c.id === cardId ? { ...c, installments: [...(c.installments || []), { id: generateId(), name: '', principal: 0, currentPayment: 0, interest: 0, remaining: 0, round: '' }] } : c) } }));
      const removeInstallment = (person, cardId, instId) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], cards: prev[person].cards.map(c => c.id === cardId ? { ...c, installments: c.installments.filter(i => i.id !== instId) } : c) } }));
      const handleInstallmentChange = (person, cardId, instId, field, value) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], cards: prev[person].cards.map(c => c.id === cardId ? { ...c, installments: c.installments.map(inst => inst.id === instId ? { ...inst, [field]: (field === 'name' || field === 'round') ? value : parseNumber(value) } : inst) } : c) } }));
      
      const addLoan = (person) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], loans: [...(prev[person].loans || []), { id: generateId(), name: '', principal: 0, currentPayment: 0, interest: 0, remaining: 0, isMinusAccount: false }] } }));
      const removeLoan = (person, loanId) => updateCurrentData(prev => ({ ...prev, [person]: { ...prev[person], loans: prev[person].loans.filter(l => l.id !== loanId) } }));

                      </div>
                      {(currentData[personKey].insurances || []).map((ins) => (
                        <div key={ins.id} className="bg-white p-3 rounded-lg shadow-sm border border-emerald-200 mb-2 relative flex flex-col md:flex-row md:items-center gap-3">
                          <div className="flex-1"><input type="text" placeholder="보험명 (예: 실비보험)" value={ins.name} onChange={(e) => handleInsuranceChange(personKey, ins.id, 'name', e.target.value)} className="w-full text-sm border-b border-gray-300 py-1 bg-transparent focus:outline-none focus:border-emerald-500 font-bold text-gray-800" /></div>
                          <div className="flex items-center gap-2 pr-6 md:pr-8 md:w-40">
                            <div className="flex-1"><input type="text" value={new Intl.NumberFormat('ko-KR').format(ins.amount || 0)} onChange={(e) => handleInsuranceChange(personKey, ins.id, 'amount', e.target.value)} className="w-full border border-emerald-200 bg-emerald-50 rounded p-1.5 text-right font-bold text-emerald-700 focus:ring-1 focus:ring-emerald-500 focus:outline-none text-sm" inputMode="numeric" /></div>
                          </div>
                          <button onClick={() => removeInsurance(personKey, ins.id)} className="absolute top-2.5 right-2 text-gray-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-md transition-colors md:static md:p-1 flex items-center justify-center w-7 h-7"><Trash2 className="w-3.5 h-3.5" /></button>
                        </div>
                      ))}
                      {(currentData[personKey].insurances?.length === 0 || !currentData[personKey].insurances) && <p className="text-xs text-gray-400 text-center py-2">등록된 보험 내역이 없습니다.</p>}
                      <div className="mt-3 bg-white p-3 rounded-lg shadow-sm border border-emerald-200 flex justify-between items-center text-sm">
                        <span className="font-bold text-gray-700">보험금 총합</span><span className="font-black text-emerald-700 text-base">{formatCurrency(calcData.insuranceTotal)}</span>
                      </div>
                    </div>
                  </ExpenseAccordion>
                  <ExpenseAccordion 
                    title="용돈" 
                    icon={PiggyBank} 
                    totalAmount={currentData[personKey].pocketMoney} 
                    themeClass={{ iconBg: 'bg-orange-100', iconColor: 'text-orange-600' }}
                    isExpanded={expandedSections[`${personKey}-pocket-${currentMonth}`]}
                    onToggle={() => toggleExpand(`${personKey}-pocket-${currentMonth}`)}
                  >
                     <div className="bg-orange-50/50 p-4 rounded-xl border border-orange-100">
                        <CurrencyInput label="이번 달 용돈 금액 입력" icon={PiggyBank} value={currentData[personKey].pocketMoney} onChange={(v) => handleInputChange(personKey, 'pocketMoney', v)} bgClass="bg-white" />
                     </div>
                  </ExpenseAccordion>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      // 데이터 로드 전 표시
      if (!isLoaded) return <div className="min-h-screen flex items-center justify-center text-gray-500">데이터를 불러오는 중입니다...</div>;

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-900 pb-20 md:pb-10">
          <header className="bg-white border-b sticky top-0 z-10 shadow-sm">
            <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
              <h1 className="text-xl font-bold flex items-center">
                <span className="bg-blue-600 text-white p-1.5 rounded-lg mr-2"><Calculator className="w-5 h-5" /></span>
                부부 지출 현황
              </h1>
              <div className="flex items-center space-x-2">
                <input 
                  type="month" 
                  value={currentMonth} 
                  onChange={(e) => handleMonthChange(e.target.value)} 
                  className="text-center border border-gray-300 rounded-lg p-1.5 font-bold focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 shadow-sm cursor-pointer" 
                />
              </div>
            </div>
            
            {/* 탭 메뉴에 "통계 (그래프)" 추가 */}
            <div className="max-w-4xl mx-auto px-4 flex space-x-1 overflow-x-auto">
              {['main', 'seoyeon', 'sunghoon', 'statistics'].map((tab) => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`py-3 px-5 text-sm font-bold whitespace-nowrap border-b-2 transition-colors ${activeTab === tab ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  {tab === 'main' ? 'MAIN (통합)' : tab === 'seoyeon' ? '서연 님' : tab === 'sunghoon' ? '성훈 님' : '통계 (그래프)'}
                </button>
              ))}
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-6">
            {activeTab === 'main' && (
              <div className="animate-in fade-in duration-500">
                <div className="bg-gradient-to-br from-gray-800 to-gray-900 rounded-3xl p-6 md:p-8 text-white shadow-lg mb-6 relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-8 opacity-10"><PiggyBank className="w-32 h-32" /></div>
                  <h2 className="text-gray-300 text-sm font-semibold mb-2">{displayMonth}월 사용금액 (성훈 & 서연)</h2>
                  <p className="text-sm text-gray-400 mb-8">※ 서연/성훈 탭에 입력된 데이터가 자동으로 합산됩니다.</p>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><p className="text-gray-400 text-sm mb-1">총 급여 합계</p><p className="text-3xl font-bold text-blue-300">{formatCurrency(mainCalc.income)}</p></div>
                    <div><p className="text-gray-400 text-sm mb-1">총 사용 금액</p><p className="text-3xl font-bold text-red-300">{formatCurrency(mainCalc.totalExpense)}</p></div>
                    <div className="md:border-l md:border-gray-700 md:pl-6 bg-white/10 p-4 rounded-xl md:bg-transparent md:p-0 md:rounded-none backdrop-blur-sm">
                      <p className="text-gray-300 text-sm mb-1 font-bold">정산 후 잔액</p>
                      <p className={`text-4xl font-black ${mainCalc.balance >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatCurrency(mainCalc.balance)}</p>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="px-6 py-4 border-b bg-gray-50"><h3 className="font-bold text-gray-700 flex items-center"><TrendingUp className="w-5 h-5 mr-2 text-gray-500" /> 지출 합계 상세</h3></div>
                  <div className="p-6">
                    <div className="space-y-4">
                      {[
                        { label: '신용카드 합계 (할부+일시불)', amount: mainCalc.totalCc, icon: CreditCard },
                        { label: '대출 납부금 합계', amount: mainCalc.loan, icon: Landmark },
                        { label: '자동이체 합계', amount: mainCalc.autoTransfer, icon: RefreshCw },
                        { label: '보험금 납입 합계', amount: mainCalc.insurance, icon: Shield },
                        { label: '용돈 합계', amount: mainCalc.pocketMoney, icon: Wallet },
                      ].map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center py-3 border-b border-gray-50 last:border-0">
                          <div className="flex items-center text-gray-600"><item.icon className="w-4 h-4 mr-3 text-gray-400" /><span className="font-medium text-sm md:text-base">{item.label}</span></div>
                          <span className="font-bold text-gray-800">{formatCurrency(item.amount)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                
                <div className="mt-6 grid grid-cols-2 gap-4">
                   <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                     <p className="text-xs text-gray-500 mb-1">서연 지출 비중</p>
                     <p className="font-bold text-blue-600 text-lg">{mainCalc.totalExpense > 0 ? Math.round((seoyeonCalc.totalExpense / mainCalc.totalExpense) * 100) : 0}%</p>
                   </div>
                   <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                     <p className="text-xs text-gray-500 mb-1">성훈 지출 비중</p>
                     <p className="font-bold text-blue-600 text-lg">{mainCalc.totalExpense > 0 ? Math.round((sunghoonCalc.totalExpense / mainCalc.totalExpense) * 100) : 0}%</p>
                   </div>
                </div>
              </div>
            )}

            {activeTab === 'seoyeon' && renderPersonView('서연', 'seoyeon', seoyeonCalc)}
            {activeTab === 'sunghoon' && renderPersonView('성훈', 'sunghoon', sunghoonCalc)}

            {/* 새로운 "통계" 뷰 */}
            {activeTab === 'statistics' && (
              <div className="animate-in fade-in duration-500">
                {/* 수입/지출 비교 라인 차트 */}
                <div className="bg-white rounded-2xl p-4 md:p-8 shadow-sm border border-gray-100 mb-6">
                  <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center border-b pb-3">
                     <BarChart3 className="w-5 h-5 mr-2 text-blue-500" /> 월별 수입 및 지출 추이
                  </h3>
                  <div className="h-72 w-full">
                     {chartData.length > 0 ? (
                       <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                             <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                             <XAxis dataKey="displayMonth" axisLine={false} tickLine={false} tick={{fill: '#6b7280', fontSize: 12}} dy={10} />
                             <YAxis axisLine={false} tickLine={false} tick={{fill: '#9ca3af', fontSize: 12}} tickFormatter={(val) => Math.round(val / 10000) + '만'} />
                             <Tooltip content={<CustomTooltip />} />
                             <Legend wrapperStyle={{ fontSize: '13px', paddingTop: '20px' }} iconType="circle" />
                             <Line type="monotone" dataKey="income" name="총 수입" stroke="#3b82f6" strokeWidth={3} dot={{r: 4, strokeWidth: 2, fill: '#fff'}} activeDot={{r: 6, strokeWidth: 0}} />
                             <Line type="monotone" dataKey="expense" name="총 지출" stroke="#ef4444" strokeWidth={3} dot={{r: 4, strokeWidth: 2, fill: '#fff'}} activeDot={{r: 6, strokeWidth: 0}} />
                          </LineChart>
                       </ResponsiveContainer>
                     ) : (
                       <div className="flex h-full items-center justify-center text-gray-400 text-sm">기록된 데이터가 없습니다.</div>
                     )}
                  </div>
                </div>

                {/* 분야별 지출 상세 누적 막대 차트 */}
                <div className="bg-white rounded-2xl p-4 md:p-8 shadow-sm border border-gray-100">
                  <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center border-b pb-3">
                     <BarChart3 className="w-5 h-5 mr-2 text-indigo-500" /> 분야별 지출 상세 추이
                  </h3>
                  <div className="h-80 w-full">
                     {chartData.length > 0 ? (
                       <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                             <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                             <XAxis dataKey="displayMonth" axisLine={false} tickLine={false} tick={{fill: '#6b7280', fontSize: 12}} dy={10} />
                             <YAxis axisLine={false} tickLine={false} tick={{fill: '#9ca3af', fontSize: 12}} tickFormatter={(val) => Math.round(val / 10000) + '만'} />
                             <Tooltip content={<CustomTooltip />} cursor={{fill: '#f3f4f6'}} />
                             <Legend wrapperStyle={{ fontSize: '13px', paddingTop: '20px' }} iconType="circle" />
                             
                             <Bar dataKey="cc" name="신용카드" stackId="a" fill="#3b82f6" />
                             <Bar dataKey="loan" name="대출금" stackId="a" fill="#6366f1" />
                             <Bar dataKey="autoTransfer" name="자동이체" stackId="a" fill="#14b8a6" />
                             <Bar dataKey="insurance" name="보험금" stackId="a" fill="#10b981" />
                             <Bar dataKey="pocketMoney" name="용돈" stackId="a" fill="#f97316" radius={[4, 4, 0, 0]} />
                          </BarChart>
                       </ResponsiveContainer>
                     ) : (
                       <div className="flex h-full items-center justify-center text-gray-400 text-sm">기록된 데이터가 없습니다.</div>
                     )}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HouseholdLedger />);
  </script>
</body>
</html>
